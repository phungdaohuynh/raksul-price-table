name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: TypeScript, ESLint, and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

      - name: Unit tests with coverage
        run: pnpm test:coverage
